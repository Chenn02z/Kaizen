services:
  - type: web
    name: kaizen
    runtime: python
    plan: starter
    region: singapore
    buildCommand: bash scripts/render-build.sh
    preDeployCommand: uv run alembic upgrade head && uv run python -m app.rag.load
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kaizen-db
          property: connectionString
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ALLOWED_USER_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-haiku-4-5-20251001
      - key: EMBED_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: text-embedding-3-small
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: PUBLIC_URL
        sync: false
      - key: MINIAPP_SECRET
        generateValue: true
      - key: SCHEDULER_SECRET
        generateValue: true
      - key: APP_TIMEZONE
        value: Asia/Singapore

databases:
  - name: kaizen-db
    plan: basic-256mb
    region: singapore
    postgresMajorVersion: "17"
    databaseName: kaizen
    user: kaizen
